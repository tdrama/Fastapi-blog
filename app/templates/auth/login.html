{% extends "base.html" %}

{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-100">

    <div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-md">

        <h1 class="text-3xl font-bold text-center mb-6">
            Login
        </h1>

        {% if error %}
        <div class="bg-red-100 text-red-700 p-3 rounded mb-4">
            {{ error }}
        </div>
        {% endif %}

        <form
            action="/auth/login"
            method="post"
            class="space-y-4"
        >

            <input
                type="email"
                name="email"
                placeholder="Email"
                required
                class="w-full border p-4 rounded-lg"
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
                class="w-full border p-4 rounded-lg"
            >

            <button
                class="w-full bg-black text-white py-4 rounded-lg"
            >
                Login
            </button>

        </form>

        <p class="text-center mt-4">

            No account?

            <a
                href="/auth/register"
                class="text-blue-600"
            >
                Register
            </a>

        </p>

    </div>

</div>

{% endblock %}
