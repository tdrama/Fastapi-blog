{% extends "base.html" %}

{% block content %}

<div class="max-w-5xl mx-auto py-10">

    <h1 class="text-4xl font-bold">
        {{ video.title }}
    </h1>

    <p class="text-gray-500 mt-2">
        👁 {{ video.views }}
        Views
    </p>

    <video
        controls
        class="w-full mt-6 rounded-lg"
    >
        <source src="{{ video.video_file }}">
    </video>

    <div class="mt-6">

        <p>
            {{ video.description }}
        </p>

    </div>

    <div class="mt-6">

        <a href="{{ video.video_file }}"
           download
           class="bg-red-600 text-white px-5 py-3 rounded-lg">
            Download Video
        </a>

    </div>

    <div class="mt-6">

        <input
            type="text"
            value="{{ request.url }}"
            readonly
            class="w-full border p-3 rounded"
        >

    </div>




        <!-- COMMENT FORM -->
        <form method="POST" action="/videos/{{ video.id }}/comment" class="mb-6">
                                                                            <textarea
                name="content"
                class="w-full border rounded-xl p-3"
                placeholder="Write a comment..."
                required
            ></textarea>

            <button class="mt-2 bg-black text-white px-4 py-2 rounded-xl">
                Post Comment
            </button>

        </form>

        <!-- COMMENT LIST -->
        <div class="space-y-4">

            {% for comment in video.comments %}

            <div class="bg-gray-100 p-4 rounded-xl">

                <p class="text-sm text-gray-600">
                    👤 {{ comment.user.username if comment.user else "Anonymous" }}
                </p>

                <p class="mt-1">
                    {{ comment.content }}
                </p>

            </div>

            {% endfor %}

        </div>

    </div>
{% endblock %}                                               55
</div>
