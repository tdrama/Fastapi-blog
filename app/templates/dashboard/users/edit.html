{% extends "base.html" %}

{% block content %}

<div class="max-w-3xl mx-auto">

    <div class="bg-white rounded-2xl shadow p-8">

        <div class="mb-8">

            <h1 class="text-3xl font-bold">
                Edit User
            </h1>

            <p class="text-gray-500 mt-2">
                Update user information
            </p>

        </div>

        {% if error %}
        <div class="bg-red-100 text-red-700 p-4 rounded-xl mb-6">
            {{ error }}
        </div>
        {% endif %}

        <form
            method="POST"
            action="/auth/update/{{ user.id }}"
            class="space-y-6"
        >

            <!-- USERNAME -->
            <div>

                <label class="block mb-2 font-semibold">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    value="{{ user.username }}"
                    required
                    class="w-full border rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-black"
                >

            </div>

            <!-- EMAIL -->
            <div>

                <label class="block mb-2 font-semibold">
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    value="{{ user.email }}"
                    required
                    class="w-full border rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-black"
                >

            </div>

            <!-- ADMIN -->
            <div class="flex items-center gap-3">

                <input
                    type="checkbox"
                    name="is_admin"
                    {% if user.is_admin %}checked{% endif %}
                    class="w-5 h-5"
                >

                <label class="font-semibold">
                    Admin Access
                </label>

            </div>

            <!-- ACTIVE -->
            <div class="flex items-center gap-3">
             
                <input
                    type="checkbox"
                    name="is_active"
                    {% if user.is_active %}checked{% endif %}
                    class="w-5 h-5"
                >

                <label class="font-semibold">
                    Active User
                </label>
            </div>
    <div> <label class="flex items-center gap-2">
    <input type="checkbox"
           name="is_super_admin"
           {% if user.is_super_admin %}checked{% endif %}>
    Super Admin
</label>
            </div>

            <!-- BUTTONS -->
            <div class="flex gap-4 pt-4">

                <button
                    type="submit"
                    class="bg-black text-white px-6 py-3 rounded-xl hover:bg-gray-800"
                >
                    Update User
                </button>

                <a
                    href="/auth/user"
                    class="bg-gray-200 px-6 py-3 rounded-xl hover:bg-gray-300"
                >
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
