{% extends "base.html" %}
{% block content %}


<div class="max-w-4xl mx-auto p-4 md:p-8">
    <!-- HEADER -->
    <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-bold">Edit News</h1>
            <p class="text-gray-500">Update your news content</p>
        </div>
        <a href="/dashboard/news" class="bg-black text-white px-5 py-3 rounded-xl hover:bg-gray-800 transition">
            ← Back to News
        </a>
    </div>

    <!-- FORM CARD -->
    <div class="bg-white rounded-2xl shadow-lg p-6 md:p-8">
        <form id="editNewsForm"  action="/dashboard/news/update/{{ news.id }}" method="POST" enctype="multipart/form-data" class="space-y-6">
            
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <!-- TITLE -->
            <div>
                <label class="text-sm font-semibold text-gray-600">Title</label>
                <input
                    type="text"
                    name="title"
                    value="{{ news.title|e }}"
                    class="w-full border rounded-xl p-3 mt-2 focus:ring-2 focus:ring-black outline-none"
                    required
                >
            </div>

            <!-- CONTENT -->
            <div>
                <label class="text-sm font-semibold text-gray-600">Content</label>
                <textarea id="news-content-editor"
                    name="content"
                    class="w-full border rounded-xl p-3 mt-2 h-40 focus:ring-2 focus:ring-black outline-none"
                    required
                >{{ news.content|e }}</textarea>
            </div>

            <!-- CATEGORY -->
            <div>
                <label class="text-sm font-semibold text-gray-600">Category</label>
                <select name="category_id" class="w-full border rounded-xl p-3 mt-2 focus:ring-2 focus:ring-black outline-none">
                    {% for cat in categories %}
                    <option value="{{ cat.id }}" {% if news.category_id == cat.id %}selected{% endif %}>
                        {{ cat.name|e }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <!-- CURRENT IMAGE -->
            {% if news.image %}
            <div>
                <label class="text-sm font-semibold text-gray-600">Current Image</label>
                <img src="{{ news.image|e }}" class="mt-3 w-full md:w-72 h-52 object-cover rounded-xl border" alt="Current news image">
            </div>
            {% endif %}

            <!-- REPLACE IMAGE -->
            <div>
                <label class="text-sm font-semibold text-gray-600">Replace Image</label>
                <input
                    type="file"
                    name="image"
                    accept="image/*"
                    class="w-full border rounded-xl p-3 mt-2 bg-gray-50"
                >
            </div>

            <!-- BUTTONS -->
            <div class="flex flex-col md:flex-row gap-4">
                <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl font-semibold w-full md:w-auto">
                    Update News
                </button>
                <a href="/dashboard/news" class="bg-gray-200 hover:bg-gray-300 text-black px-6 py-3 rounded-xl text-center w-full md:w-auto">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
<script>
$(document).ready(function() {
    $('#news-content-editor').summernote({
        placeholder: 'Edit content layouts here...',
        tabsize: 2,
        height: 450,
        toolbar: [
            ['style', ['style']],
            ['font', ['bold', 'underline', 'clear', 'italic']],
            ['color', ['color']],
            ['para', ['ul', 'ol', 'paragraph']],
            ['table', ['table']],
            ['insert', ['link', 'picture', 'video']],
            ['view', ['fullscreen', 'codeview', 'help']]
        ],
        callbacks: {
            onChange: function(contents, $editable) {
                $('#news-content-editor').val(contents);
            },
            onImageUpload: function(files) {
                for (let i = 0; i < files.length; i++) {
                    executeMediaCloudStreamUpload(files[i], 'image');
                }
            }
        }
    });

    // ✅ FIXED STYLING BLOCKS: Restores explicit visual visibility definitions for images/videos inside your editor container
    $('.note-editable').addClass('prose max-w-none p-4');
    $('head').append('<style>.note-editable img { max-width: 100% !important; height: auto !important; display: block !important; margin: 15px auto !important; border-radius: 12px; } .note-editable video { max-width: 100% !important; border-radius: 12px; display: block !important; margin: 15px auto !important; }</style>');

    // 💥 INTERCEPT VIDEO AND PDF DOCUMENT DRAG & DROPS
    $('.note-editable').on('drop', function(e) {
        const dataTransfer = e.originalEvent.dataTransfer;
        if (dataTransfer && dataTransfer.files && dataTransfer.files.length) {
            e.preventDefault();
            e.stopPropagation();s
            
            const droppedFiles = dataTransfer.files;
            for (let i = 0; i < droppedFiles.length; i++) {
                const file = droppedFiles[i];
                const ext = file.name.split('.').pop().toLowerCase();
                
                if (['mp4', 'webm', 'ogg', 'mov'].includes(ext)) {
                    executeMediaCloudStreamUpload(file, 'video');
                } else if (ext === 'pdf') {
                    executeMediaCloudStreamUpload(file, 'pdf');
                } else if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) {
                    executeMediaCloudStreamUpload(file, 'image');
                }
            }
        }
    });

    // Standalone upload transmission engine
    async function executeMediaCloudStreamUpload(file, type) {
        const formData = new FormData();
        formData.append("file", file);

        const csrfToken = document.querySelector('input[name="csrf_token"]').value;

        try {
            const response = await fetch('/api/media/upload', {
                method: 'POST',
                headers: {
                    'X-CSRF-Token': csrfToken
                },
                body: formData
            });

            if (!response.ok) throw new Error("File submission rejected by backend.");
            const payload = await response.json();

            if (type === 'image') {
                $('#news-content-editor').summernote('insertImage', payload.url);
            } 
            else if (type === 'video') {
                const videoElementBlock = `<video src="${payload.url}" controls class="w-full max-w-2xl rounded-2xl my-4 border shadow-sm" style="display:block; margin: 15px 0;"></video><p></p>`;
                $('#news-content-editor').summernote('pasteHTML', videoElementBlock);
            } 
            else if (type === 'pdf') {
                const cleanCardTemplateNode = `
                    <div class="my-4 p-4 border border-gray-200 rounded-xl bg-gray-50 flex items-center justify-between max-w-md shadow-sm select-none" contenteditable="false" style="border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; background-color: #f9fafb; display: flex; align-items: center; justify-content: space-between; max-w: 450px; margin: 15px 0;">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <span style="font-size: 28px;">📄</span>
                            <div>
                                <p style="font-weight: 600; font-size: 14px; color: #1f2937; margin: 0 0 2px 0;">${file.name}</p>
                                <p style="font-size: 12px; color: #9ca3af; margin: 0;">PDF Document Attachment</p>
                            </div>
                        </div>
                        <a href="${payload.url}" target="_blank" download style="background-color: #000; color: #fff; text-decoration: none; font-size: 12px; padding: 8px 14px; border-radius: 8px; font-weight: 500; display: inline-block;">
                            Download
                        </a>
                    </div><p></p>`;
                $('#news-content-editor').summernote('pasteHTML', cleanCardTemplateNode);
            }
        } catch (err) {
            console.error("Media processing error: ", err);
            alert("File upload failed.");
        }
    }
    // Intercept form updates
    document.getElementById("editNewsForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        const form = e.target;
        const token = form.querySelector('input[name="csrf_token"]').value;

       // $('#news-content-editor').val($('#news-content-editor').summernote('code'));
        // Save Summernote content
    const html = $('#news-content-editor').summernote('code');
    $('textarea[name="content"]').val(html);
        const formData = new FormData(form);

        try {
            const response = await fetch(form.action, {
                method: "POST",
                headers: {
                    "X-CSRF-Token": token 
                },
                body: formData
            });

            if (response.redirected) {
                window.location.href = response.url; 
            } else {
             const text = await response.text();
document.open();
document.write(text);
document.close();
}
} catch (err) {
console.error(err);
alert("An error occurred during content updates.");
}
});
});
</script>
{% endblock %}
