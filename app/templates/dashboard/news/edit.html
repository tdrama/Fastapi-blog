{% extends "base.html" %}

{% block content %}

<div class="max-w-4xl mx-auto p-4 md:p-8">

    <!-- HEADER -->
    <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-8 gap-4">

        <div>
            <h1 class="text-3xl font-bold">Edit News</h1>
            <p class="text-gray-500">
                Update your news content
            </p>
        </div>

        <a href="/dashboard/news"
           class="bg-black text-white px-5 py-3 rounded-xl hover:bg-gray-800 transition">
            ← Back to News
        </a>

    </div>

    <!-- FORM CARD -->
    <div class="bg-white rounded-2xl shadow-lg p-6 md:p-8">

        <form action="/dashboard/news/update/{{ news.id }}"
              method="POST"
              enctype="multipart/form-data"
              class="space-y-6">

            <!-- TITLE -->
            <div>
                <label class="text-sm font-semibold text-gray-600">
                    Title
                </label>

                <input
                    type="text"
                    name="title"
                    value="{{ news.title }}"
                    class="w-full border rounded-xl p-3 mt-2 focus:ring-2 focus:ring-black outline-none"
                    required
                >
            </div>

            <!-- CONTENT -->
            <div>

                <label class="text-sm font-semibold text-gray-600">
                    Content
                </label>

                <textarea
                    name="content"
                    class="w-full border rounded-xl p-3 mt-2 h-40 focus:ring-2 focus:ring-black outline-none"
                    required
                >{{ news.content }}</textarea>

            </div>

            <!-- CATEGORY -->
            <div>

                <label class="text-sm font-semibold text-gray-600">
                    Category
                </label>

                <select
                    name="category_id"
                    class="w-full border rounded-xl p-3 mt-2 focus:ring-2 focus:ring-black outline-none"
                >

                    {% for cat in categories %}

                    <option
                        value="{{ cat.id }}"
                        {% if news.category_id == cat.id %}selected{% endif %}>
                        {{ cat.name }}
                    </option>

                    {% endfor %}

                </select>

            </div>

            <!-- CURRENT IMAGE -->
            {% if news.image %}

            <div>

                <label class="text-sm font-semibold text-gray-600">
                    Current Image
                </label>

                <img
                    src="{{ news.image }}"
                    class="mt-3 w-full md:w-72 h-52 object-cover rounded-xl border"
                >

            </div>

            {% endif %}

            <!-- REPLACE IMAGE -->
            <div>

                <label class="text-sm font-semibold text-gray-600">
                    Replace Image
                </label>

                <input
                    type="file"
                    name="image"
                    accept="image/*"
                    class="w-full border rounded-xl p-3 mt-2 bg-gray-50"
                >

            </div>

            <!-- BUTTONS -->
            <div class="flex flex-col md:flex-row gap-4">

                <button
                    type="submit"
                    class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl font-semibold w-full md:w-auto"
                >
                    Update News
                </button>

                <a
                    href="/dashboard/news"
                    class="bg-gray-200 hover:bg-gray-300 text-black px-6 py-3 rounded-xl text-center w-full md:w-auto"
                >
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
