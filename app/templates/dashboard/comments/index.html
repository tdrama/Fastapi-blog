<!DOCTYPE html>
<html>
<head>
    <title>Comments</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f4f6f8;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .comment-card {
            background: #fff;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .meta {
            font-size: 13px;
            color: #777;
            margin-bottom: 8px;
        }

        .content {
            font-size: 15px;
            margin-bottom: 10px;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 6px 10px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 13px;
        }

        .delete {
            background: #e74c3c;
            color: white;
        }

        .delete:hover {
            background: #c0392b;
        }

        .empty {
            text-align: center;
            color: #888;
            margin-top: 50px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Comments</h1>

    {% if comments  %}

        {% for comment in comments %}

        <div class="comment-card">

            <div class="meta">
                ID: {{ comment.id }}
                {% if comment.user %}
                    | User ID: {{ comment.user.username }}
            { elif comment.user_id %}| User ID: {{ comment.user_id }}
                {% endif %}
            </div>

            <div class="content">
                {{ comment.content }}
            </div>

            <div class="actions">
                <a href="/dashboard/comments/delete/{{ comment.id }}" class="btn delete"
         onclick="return confirm('Delete comment?')">
                    Delete
                </a>
            </div>

        </div>

        {% endfor %}

    {% else %}

        <div class="empty">
            No comments found.
        </div>

    {% endif %}

</div>

</body>
</html>
