{% extends "base.html" %}
{% block content %}
<div class="p-6">
    <a href="/dashboard" class="bg-black text-white px-4 py-2 rounded">Dashboard</a>

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">Edit Video</h1>
        <a href="/dashboard/videos" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded">
            Back to Videos
        </a>
    </div>

    <div class="bg-white p-6 rounded-xl shadow">
        <!-- ✅ FIXED ACTION: Explicit static path routing eliminates url_for compilation crashes -->
        <form id="videoUpdateForm" action="/dashboard/videos/update/{{ video.id }}"
              method="POST"
              enctype="multipart/form-data"
              class="space-y-5">

            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <!-- TITLE -->
            <div>
                <label class="block mb-1 font-medium">Title</label>
                <input type="text"
                       name="title"
                       value="{{ video.title|e }}"
                       class="w-full border p-3 rounded-xl"
                       required>
            </div>

            <!-- DESCRIPTION -->
            <div>
                <label class="block mb-1 font-medium">Description</label>
                <textarea name="description"
                          class="w-full border p-3 rounded-xl h-32">{{ video.description|e }}</textarea>
            </div>

            <!-- CATEGORY -->
            <div>
                <label class="block mb-1 font-medium">Category</label>
                <select name="category_id" required class="w-full border p-3 rounded-xl">
                    <option value="" disabled>Select Category</option>
                    {% for cat in categories %}
                        <option value="{{ cat.id }}" {% if video.category_id == cat.id %}selected{% endif %}>
                            {{ cat.name|e }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!-- CURRENT VIDEO -->
            <div>
                <p class="font-semibold mb-2">Current Video</p>
                <video width="400" controls class="rounded-xl">
                    <!-- FIXED SOURCE: Render the full path stored in your database directly -->
                    <source src="{{ url_for('static', path='uploads/' ~ video.video_file) }}">
                    Your browser does not support video playback.
                </video>
            </div>

            <!-- NEW VIDEO -->
            <div>
                <label class="block mb-1 font-medium">Replace Video File</label>
                <!-- 💥 FIXED INPUT NAME: Changed name="video" to name="video_file" to match your backend form_data parser perfectly -->
                <input type="file" name="video_file" accept="video/*" class="w-full border p-3 rounded-xl">
                <p class="text-sm text-gray-500 mt-1">Leave empty to keep current video</p>
            </div>


            <!-- NEW THUMBNAIL -->
            <div>
                <label class="block mb-1 font-medium">Replace Thumbnail</label>
                <input type="file" name="thumbnail" accept="image/*" class="w-full border p-3 rounded-xl">
                <p class="text-sm text-gray-500 mt-1">Leave empty to keep current thumbnail</p>
            </div>

            <!-- BUTTONS -->
            <div class="flex gap-3">
                <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl font-semibold">
                    Update Video
                </button>
                <a href="/dashboard/videos" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-6 py-3 rounded-xl font-semibold">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<!-- PERFECTED HEADER TOKEN BRIDGE METHOD WITH NON-DESTRUCTIVE ERROR CAPTURE -->
<script>
document.getElementById("videoUpdateForm").addEventListener("submit", async function(e) {
    e.preventDefault(); // Hold back raw submission to prevent 403 blocks

    const form = e.target;
    const token = form.querySelector('input[name="csrf_token"]').value;

    // Encapsulate text values and file chunks into an asynchronous FormData buffer map
    const formData = new FormData(form);

    try {
        const response = await fetch(form.action, {
            method: "POST",
            headers: {
                "X-CSRF-Token": token // Sends key safely straight to your global middleware
            },
            body: formData,
            credentials: "include"
        });

        if (response.redirected) {
            window.location.href = response.url; // Route straight back to your clean videos listing gallery view
        } else if (response.ok) {
            window.location.href = "/dashboard/videos";
        } else {
            // FIXED: Parse JSON errors cleanly without wiping the page DOM structure
            const data = await response.json().catch(() => ({}));
            alert(data.detail || "Error: Failed to process video update streams securely.");
        }
    } catch (err) {
        console.error(err);
        alert("A network transmission error occurred during update execution.");
    }
});

</script>
{% endblock %}
