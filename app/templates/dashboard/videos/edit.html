{% extends "base.html" %}

{% block content %}

<div class="p-6 md:p-10">

    <h1 class="text-2xl font-bold mb-6">
        Edit Video
    </h1>

    <form
        action="/dashboard/videos/update/{{ video.id }}"
        method="POST"
        enctype="multipart/form-data"
        class="space-y-5 bg-white p-6 rounded-2xl shadow"
    >

        <input
            type="text"
            name="title"
            value="{{ video.title }}"
            class="w-full border p-3 rounded-xl"
            required
        >

        <textarea
            name="description"
            class="w-full border p-3 rounded-xl h-32"
        >{{ video.description }}</textarea>

        <p class="text-sm text-gray-500">
            Current file:
        </p>

        <video
            width="300"
            controls
            class="rounded-xl mb-3"
        >
            <source src="{{ video.video_file }}">
        </video>

        <input
            type="file"
            name="video_file"
            class="w-full border p-3 rounded-xl"
        >
   <select name="category_id"
            class="w-full border p-3 rounded"
            required>

        <option value="">
            Select Category
        </option>

        {% for cat in categories %}
            <option value="{{ cat.id }}">
                {{ cat.name }}
            </option>
        {% endfor %}

    </select>
        <button
            class="bg-green-600 text-white px-6 py-3 rounded-xl"
        >
            Update Video
        </button>

    </form>

</div>

{% endblock %}
